<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
<title id="title">Question-first AntennaBench setup mockup</title>
<desc id="desc">A setup screen that begins with the operator's on-air comparison question, shows bands and directions, explains what the plan can and cannot answer, and previews a counterbalanced WSPR plan.</desc>
<style>
text{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#173131}.serif{font-family:Georgia,"Times New Roman",serif}.muted{fill:#667773}.tiny{font-size:11px}.small{font-size:13px}.body{font-size:15px}.label{font-size:11px;font-weight:800;letter-spacing:1.4px}.h1{font-size:38px}.h2{font-size:22px}.bold{font-weight:800}.white{fill:#fff}.teal{fill:#2f8175}.line{stroke:#d6dfd9;stroke-width:1}.card{fill:#fffefa;stroke:#d6dfd9;stroke-width:1}.soft{fill:#f7f9f5}.forest{fill:#153b39}.amber{fill:#d69a48}.good{fill:#e7f3ef;stroke:#acd0c7}.warn{fill:#fff6e5;stroke:#e4c892}.pill{fill:#e7f3ef;stroke:#acd0c7}.shadow{filter:url(#s)}</style>
<defs><filter id="s" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f3431" flood-opacity=".10"/></filter></defs>
<rect width="1000" height="760" fill="#e7ece7"/>
<rect x="18" y="16" width="964" height="728" rx="22" fill="#fafbf7" stroke="#b8c8c2" class="shadow"/>
<rect x="18" y="16" width="220" height="728" rx="22" class="forest"/><rect x="216" y="16" width="22" height="728" class="forest"/>
<circle cx="58" cy="56" r="20" fill="#245451"/><path d="M58 42v27M47 62q11-17 22 0" fill="none" stroke="#f0b35a" stroke-width="2"/><text x="88" y="52" class="white serif h2">AntennaBench</text><text x="88" y="70" class="tiny" fill="#9ab4ae">Evidence-first antenna experiments</text>
<text x="40" y="112" class="label" fill="#83aaa2">SESSION WORKFLOW</text>
<rect x="31" y="133" width="191" height="64" rx="12" fill="#245451"/><rect x="31" y="133" width="4" height="64" rx="2" class="amber"/><text x="48" y="157" class="tiny" fill="#9db8b2">01</text><text x="74" y="157" class="white bold small">Your question</text><text x="74" y="177" class="tiny" fill="#c0d2cd">Purpose and scope</text>
<text x="48" y="231" class="tiny" fill="#9db8b2">02</text><text x="74" y="231" class="white bold small">Station &amp; antennas</text><text x="74" y="249" class="tiny" fill="#93ada8">Existing details</text>
<text x="48" y="285" class="tiny" fill="#9db8b2">03</text><text x="74" y="285" class="white bold small">Run plan</text><text x="74" y="303" class="tiny" fill="#93ada8">Counterbalanced cycles</text>
<text x="48" y="339" class="tiny" fill="#9db8b2">04</text><text x="74" y="339" class="white bold small">Review</text><text x="74" y="357" class="tiny" fill="#93ada8">Can / cannot answer</text>
<line x1="40" y1="678" x2="205" y2="678" stroke="#42615c"/><text x="40" y="705" class="white bold tiny">On-air evidence only</text><text x="40" y="724" class="tiny" fill="#94aca7">SWR and TDR stay in dedicated analyzers.</text>
<text x="274" y="60" class="label muted">PREPARE AN EXPERIMENT</text><text x="274" y="101" class="serif h1">What do you want to learn?</text><text x="274" y="128" class="body muted">Choose the operator question first. AntennaBench maps it to existing mode, goal, bands, directions, and a repeatable order.</text>
<g transform="translate(274 153)">
<rect width="132" height="128" rx="13" class="card"/><circle cx="24" cy="24" r="12" class="teal"/><text x="20" y="29" class="white bold small">✓</text><text x="16" y="58" class="bold small">Whole-station</text><text x="16" y="77" class="bold small">comparison</text><text x="16" y="101" class="tiny muted">TX + RX across the</text><text x="16" y="117" class="tiny muted">selected bands</text>
<rect x="143" width="132" height="128" rx="13" class="card"/><circle cx="167" cy="24" r="12" fill="#eef2ee"/><text x="163" y="29" class="bold small">↑</text><text x="159" y="58" class="bold small">Where am I</text><text x="159" y="77" class="bold small">heard better?</text><text x="159" y="101" class="tiny muted">Transmit-focused</text>
<rect x="286" width="132" height="128" rx="13" class="card"/><circle cx="310" cy="24" r="12" fill="#eef2ee"/><text x="306" y="29" class="bold small">↓</text><text x="302" y="58" class="bold small">What can I</text><text x="302" y="77" class="bold small">hear better?</text><text x="302" y="101" class="tiny muted">Receive-focused</text>
<rect x="429" width="132" height="128" rx="13" class="card"/><circle cx="453" cy="24" r="12" fill="#eef2ee"/><text x="449" y="29" class="bold small">↔</text><text x="445" y="58" class="bold small">DX versus</text><text x="445" y="77" class="bold small">regional</text><text x="445" y="101" class="tiny muted">Distance lens</text>
<rect x="572" width="132" height="128" rx="13" class="card"/><circle cx="596" cy="24" r="12" fill="#eef2ee"/><text x="592" y="29" class="bold small">≈</text><text x="588" y="58" class="bold small">Weak-signal</text><text x="588" y="77" class="bold small">reliability</text><text x="588" y="101" class="tiny muted">Consistency lens</text>
</g>
<rect x="274" y="302" width="450" height="196" rx="15" class="card"/><text x="294" y="329" class="label muted">QUESTION DETAILS</text><text x="294" y="362" class="serif h2">Whole-station comparison</text>
<text x="294" y="394" class="tiny muted">Directions</text><rect x="294" y="405" width="112" height="34" rx="8" class="pill"/><text x="315" y="427" class="bold small">TX + RX</text>
<text x="425" y="394" class="tiny muted">Bands</text><rect x="425" y="405" width="52" height="34" rx="8" class="pill"/><text x="438" y="427" class="bold small">20 m</text><rect x="486" y="405" width="52" height="34" rx="8" class="pill"/><text x="499" y="427" class="bold small">40 m</text>
<text x="558" y="394" class="tiny muted">Repetitions</text><rect x="558" y="405" width="70" height="34" rx="8" class="soft" stroke="#c8d3cc"/><text x="586" y="427" class="bold small">4</text>
<rect x="294" y="454" width="198" height="30" rx="8" class="good"/><text x="308" y="474" class="tiny bold">16 WSPR cycles · at least 32 min</text>
<rect x="742" y="302" width="211" height="196" rx="15" class="forest"/><text x="762" y="329" class="label" fill="#92b7af">COUNTERBALANCED PLAN</text><text x="762" y="361" class="white serif h2">Four directed periods</text><text x="762" y="388" class="tiny" fill="#b9cec8">Round 1</text><text x="762" y="410" class="white bold small">RX A → RX B → TX B → TX A</text><text x="762" y="439" class="tiny" fill="#b9cec8">Round 2</text><text x="762" y="461" class="white bold small">RX B → RX A → TX A → TX B</text><text x="762" y="484" class="tiny" fill="#b9cec8">Order balance reduces, but does not remove, time effects.</text>
<rect x="274" y="516" width="326" height="180" rx="15" class="good"/><text x="294" y="544" class="label teal">THIS PLAN CAN DESCRIBE</text><text x="294" y="575" class="small bold">✓ Same-path SNR differences</text><text x="294" y="600" class="small bold">✓ Overlapping and unmatched paths</text><text x="294" y="625" class="small bold">✓ Patterns by band, TX/RX, distance</text><text x="294" y="650" class="small bold">✓ Whether patterns repeat across blocks</text>
<rect x="616" y="516" width="337" height="180" rx="15" class="warn"/><text x="636" y="544" class="label" fill="#80581d">THIS PLAN CANNOT ESTABLISH</text><text x="636" y="575" class="small bold">— Universal antenna gain</text><text x="636" y="600" class="small bold">— Causal superiority or a winner</text><text x="636" y="625" class="small bold">— Missing decode = zero signal</text><text x="636" y="650" class="small bold">— Electrical health, SWR, or feedline faults</text>
<rect x="807" y="710" width="146" height="22" rx="11" fill="#fff" stroke="#cfd8d2"/><text x="819" y="725" class="tiny bold muted">ILLUSTRATIVE CONCEPT</text>
</svg>
