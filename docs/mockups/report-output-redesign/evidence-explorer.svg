<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1080" viewBox="0 0 1000 1080" role="img" aria-labelledby="title desc">
<title id="title">AntennaBench run-quality and evidence explorer mockup</title><desc id="desc">A progressive-disclosure evidence screen with an answerability matrix, exclusion summary, plan-versus-actual timeline, paired-path audit sample, automatic best-effort public acquisition status, and a collapsed audit appendix.</desc>
