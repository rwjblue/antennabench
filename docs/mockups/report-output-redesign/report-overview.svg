<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="920" viewBox="0 0 1000 920" role="img" aria-labelledby="title desc">
<title id="title">Answer-first AntennaBench report overview mockup</title><desc id="desc">An operator-facing report overview with a scoped result, four evidence facts, results by band and direction, a same-path difference plot, supported and unsupported wording, and a next-run recommendation.</desc>
<style>text{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#173131}.serif{font-family:Georgia,"Times New Roman",serif}.muted{fill:#667773}.tiny{font-size:10px}.small{font-size:12px}.body{font-size:14px}.label{font-size:10px;font-weight:800;letter-spacing:1.3px}.h1{font-size:36px}.h2{font-size:21px}.bold{font-weight:800}.white{fill:#fff}.line{stroke:#d6dfd9}.card{fill:#fffefa;stroke:#d6dfd9}.soft{fill:#f7f9f5}.forest{fill:#153b39}.teal{fill:#2f8175}.blue{fill:#456f9f}.orange{fill:#b86c3f}.good{fill:#e7f3ef;stroke:#acd0c7}.warn{fill:#fff6e5;stroke:#e4c892}.bad{fill:#f8eee8;stroke:#dec5b6}</style>
<rect width="1000" height="920" fill="#e7ece7"/><rect x="16" y="14" width="968" height="892" rx="22" fill="#fafbf7" stroke="#b8c8c2"/><rect x="16" y="14" width="205" height="892" rx="22" class="forest"/><rect x="199" y="14" width="22" height="892" class="forest"/>
<circle cx="51" cy="51" r="18" fill="#245451"/><path d="M51 39v24M41 57q10-15 20 0" fill="none" stroke="#f0b35a" stroke-width="2"/><text x="78" y="48" class="white serif h2">AntennaBench</text><text x="78" y="65" class="tiny" fill="#9ab4ae">Evidence-first antenna experiments</text>
<text x="34" y="104" class="label" fill="#83aaa2">REPORT QUESTIONS</text><rect x="28" y="122" width="179" height="58" rx="11" fill="#245451"/><rect x="28" y="122" width="4" height="58" rx="2" fill="#d69a48"/><text x="43" y="146" class="tiny" fill="#9db8b2">01</text><text x="67" y="146" class="white bold small">What did the run show?</text><text x="67" y="164" class="tiny" fill="#c0d2cd">Scoped summary and limits</text>
<text x="43" y="214" class="tiny" fill="#9db8b2">02</text><text x="67" y="214" class="white bold small">Same-path signal</text><text x="67" y="232" class="tiny" fill="#93ada8">Paired SNR differences</text><text x="43" y="270" class="tiny" fill="#9db8b2">03</text><text x="67" y="270" class="white bold small">Reach &amp; unique paths</text><text x="67" y="288" class="tiny" fill="#93ada8">Overlap without zero-filling</text><text x="43" y="326" class="tiny" fill="#9db8b2">04</text><text x="67" y="326" class="white bold small">Distance &amp; direction</text><text x="67" y="344" class="tiny" fill="#93ada8">Where patterns appeared</text><text x="43" y="382" class="tiny" fill="#9db8b2">05</text><text x="67" y="382" class="white bold small">Run quality</text><text x="67" y="400" class="tiny" fill="#93ada8">Order, missingness, exclusions</text><text x="43" y="438" class="tiny" fill="#9db8b2">06</text><text x="67" y="438" class="white bold small">Audit appendix</text><text x="67" y="456" class="tiny" fill="#93ada8">Full tables and provenance</text>
<line x1="34" y1="829" x2="190" y2="829" stroke="#42615c"/><text x="34" y="852" class="white bold tiny">Default reading path</text><text x="34" y="870" class="tiny" fill="#94aca7">Answer first; audit detail remains available.</text>
<text x="251" y="49" class="label muted">SESSION EVIDENCE REPORT</text><text x="251" y="84" class="serif h1">Vertical vs Inverted V</text><rect x="251" y="98" width="70" height="23" rx="11" fill="#eaf0f7" stroke="#bfcede"/><text x="266" y="114" class="tiny bold" fill="#3b6089">20 m + 40 m</text><rect x="329" y="98" width="50" height="23" rx="11" fill="#f8eee8" stroke="#dec5b6"/><text x="342" y="114" class="tiny bold" fill="#92522f">TX + RX</text><rect x="889" y="39" width="67" height="25" rx="12" class="good"/><text x="903" y="56" class="tiny bold" fill="#286d63">ENDED</text>
<rect x="251" y="139" width="705" height="151" rx="15" class="good"/><text x="269" y="166" class="label teal">PLAIN-LANGUAGE RESULT</text><text x="269" y="204" class="bold" font-size="23">This session supports descriptive patterns, not an overall winner.</text><text x="269" y="234" class="body muted">The best-supported pattern was on 40 m transmit: same-reporting paths tended to show the Inverted V higher than the Vertical.</text><text x="269" y="255" class="body muted">The 20 m and receive-side evidence was mixed or too sparse for a strong summary.</text><rect x="748" y="157" width="188" height="113" rx="12" class="card"/><text x="765" y="183" class="label muted">EVIDENCE READINESS</text><text x="765" y="207" class="bold small">Best covered: 40 m TX</text><text x="765" y="230" class="tiny muted">8 paired paths · 4 blocks</text><rect x="765" y="244" width="140" height="8" rx="4" fill="#e1e6ef"/><rect x="765" y="244" width="91" height="8" rx="4" class="teal"/>
<g transform="translate(251 306)"><rect width="166" height="78" rx="12" class="card"/><text x="14" y="24" class="label muted">PAIRED EVIDENCE</text><text x="14" y="51" class="bold" font-size="21">24 rows</text><text x="14" y="68" class="tiny muted">11 unique paths · 5 blocks</text><rect x="177" width="166" height="78" rx="12" class="card"/><text x="191" y="24" class="label muted">USABLE OBSERVATIONS</text><text x="191" y="51" class="bold" font-size="21">19 / 26</text><text x="191" y="68" class="tiny muted">7 exclusions remain visible</text><rect x="354" width="166" height="78" rx="12" class="card"/><text x="368" y="24" class="label muted">ORDER BALANCE</text><text x="368" y="51" class="bold" font-size="21">3 A→B · 2 B→A</text><text x="368" y="68" class="tiny muted">Order sensitivity can be inspected</text><rect x="531" width="174" height="78" rx="12" class="card"/><text x="545" y="24" class="label muted">ACQUISITION</text><text x="545" y="51" class="bold" font-size="21">Best effort</text><text x="545" y="68" class="tiny muted">Automatic public reports; brief caveat</text></g>
<rect x="251" y="400" width="470" height="199" rx="14" class="card"/><text x="269" y="427" class="label muted">ONE ROW PER ANSWERABLE QUESTION</text><text x="269" y="455" class="serif h2">Results by band and direction</text><text x="275" y="480" class="tiny bold muted">LENS</text><text x="380" y="480" class="tiny bold muted">PATTERN</text><text x="501" y="480" class="tiny bold muted">MEDIAN PATH Δ</text><text x="621" y="480" class="tiny bold muted">PAIRS</text>
<line x1="269" y1="490" x2="704" y2="490" class="line"/><circle cx="278" cy="509" r="4" class="blue"/><text x="289" y="513" class="small bold">20 m TX</text><text x="380" y="513" class="small">Mixed</text><text x="512" y="513" class="small bold">+0.4 dB</text><text x="635" y="513" class="small">5</text><line x1="269" y1="524" x2="704" y2="524" class="line"/><circle cx="278" cy="543" r="4" class="teal"/><text x="289" y="547" class="small bold">20 m RX</text><text x="380" y="547" class="small">Too sparse</text><text x="512" y="547" class="small bold">Unavailable</text><text x="635" y="547" class="small">2</text><line x1="269" y1="558" x2="704" y2="558" class="line"/><circle cx="278" cy="577" r="4" class="blue"/><text x="289" y="581" class="small bold">40 m TX</text><text x="380" y="581" class="small">Leans Inverted V</text><text x="512" y="581" class="small bold" fill="#9b6a2b">+1.7 dB</text><text x="635" y="581" class="small">8</text>
<rect x="735" y="400" width="221" height="199" rx="14" class="card"/><text x="753" y="427" class="label muted">INTERPRETATION GUARDRAIL</text><text x="753" y="455" class="serif h2">What this report can say</text><text x="753" y="486" class="tiny muted">1. Compare the same path in adjacent, eligible blocks.</text><text x="753" y="510" class="tiny muted">2. Show whether differences repeat across paths and order.</text><text x="753" y="534" class="tiny muted">3. Keep TX, RX, band, source, and mode separate.</text><text x="753" y="566" class="tiny bold" fill="#92522f">It does not declare antenna gain or a winner.</text>
<rect x="251" y="615" width="470" height="239" rx="14" class="card"/><text x="269" y="642" class="label muted">DISTRIBUTION BEFORE AVERAGES</text><text x="269" y="670" class="serif h2">Same-path differences</text><line x1="465" y1="699" x2="465" y2="783" stroke="#788b86"/><text x="269" y="693" class="tiny muted">← Vertical higher</text><text x="619" y="693" class="tiny muted">Inverted V higher →</text>
<text x="269" y="720" class="small bold">20 m TX</text><line x1="343" y1="716" x2="655" y2="716" stroke="#e3e8e5" stroke-width="13"/><circle cx="432" cy="716" r="4" class="blue"/><circle cx="459" cy="716" r="4" class="blue"/><circle cx="487" cy="716" r="4" class="blue"/><circle cx="525" cy="716" r="4" class="blue"/><rect x="482" y="709" width="3" height="14" class="teal"/>
<text x="269" y="748" class="small bold">40 m TX</text><line x1="343" y1="744" x2="655" y2="744" stroke="#e3e8e5" stroke-width="13"/><circle cx="455" cy="744" r="4" class="blue"/><circle cx="494" cy="744" r="4" class="blue"/><circle cx="521" cy="744" r="4" class="blue"/><circle cx="551" cy="744" r="4" class="blue"/><circle cx="587" cy="744" r="4" class="blue"/><rect x="536" y="737" width="3" height="14" class="teal"/>
<rect x="269" y="790" width="206" height="47" rx="9" class="good"/><text x="281" y="808" class="tiny bold" fill="#286d63">SUPPORTED WORDING</text><text x="281" y="825" class="tiny">“Observed 40 m TX paths tended higher on B.”</text><rect x="487" y="790" width="216" height="47" rx="9" class="bad"/><text x="499" y="808" class="tiny bold" fill="#92522f">UNSUPPORTED WORDING</text><text x="499" y="825" class="tiny">“B has 1.7 dB more gain” or “wins.”</text>
<rect x="735" y="615" width="221" height="151" rx="14" class="warn"/><text x="753" y="642" class="label" fill="#80581d">MOST USEFUL NEXT RUN</text><text x="753" y="670" class="serif h2">Reduce remaining uncertainty</text><text x="753" y="699" class="tiny">1. Add two counterbalanced 20 m RX rounds.</text><text x="753" y="721" class="tiny">2. Repeat in a second time window.</text><text x="753" y="743" class="tiny">3. Keep power and feedline state confirmed.</text>
<rect x="735" y="780" width="221" height="74" rx="14" class="card"/><text x="753" y="807" class="label muted">SHARE OUTPUT</text><text x="753" y="832" class="serif h2">Summary · Full evidence · Bundle</text><rect x="807" y="871" width="149" height="22" rx="11" fill="#fff" stroke="#cfd8d2"/><text x="818" y="886" class="tiny bold muted">ILLUSTRATIVE CONCEPT</text>
</svg>
