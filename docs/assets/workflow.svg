<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 300" role="img" aria-labelledby="title desc">
  <title id="title">AntennaBench experiment workflow</title>
  <desc id="desc">Four connected steps: plan the comparison, run guided antenna changes, collect attributed observations, and review an evidence-first report.</desc>
  <rect width="1260" height="300" rx="28" fill="#f7f1df"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="630" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#102b2b">A repeatable experiment, from setup to evidence</text>

    <g transform="translate(36 74)">
      <rect width="250" height="184" rx="22" fill="#ffffff" stroke="#d8d1bf" stroke-width="2"/>
      <circle cx="42" cy="42" r="24" fill="#f0b35a"/>
      <text x="42" y="50" text-anchor="middle" font-size="23" font-weight="800" fill="#102b2b">1</text>
      <text x="78" y="48" font-size="25" font-weight="750" fill="#102b2b">Plan</text>
      <path d="M38 88h28M38 112h28M38 136h28" stroke="#70c5b8" stroke-width="8" stroke-linecap="round"/>
      <path d="M80 88h126M80 112h104M80 136h118" stroke="#102b2b" stroke-width="5" stroke-linecap="round" opacity=".72"/>
      <text x="32" y="170" font-size="16" fill="#3e504d">Station, antennas, order</text>
    </g>

    <path d="M298 166h30" stroke="#70c5b8" stroke-width="8" stroke-linecap="round"/>
    <path d="M320 152l18 14-18 14" fill="none" stroke="#70c5b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(346 74)">
      <rect width="250" height="184" rx="22" fill="#ffffff" stroke="#d8d1bf" stroke-width="2"/>
      <circle cx="42" cy="42" r="24" fill="#f0b35a"/>
      <text x="42" y="50" text-anchor="middle" font-size="23" font-weight="800" fill="#102b2b">2</text>
      <text x="78" y="48" font-size="25" font-weight="750" fill="#102b2b">Run</text>
      <path d="M48 118h148" stroke="#102b2b" stroke-width="7" stroke-linecap="round"/>
      <path d="M48 118l24-18M48 118l24 18M196 118l-24-18M196 118l-24 18" fill="none" stroke="#70c5b8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="122" cy="118" r="18" fill="#f0b35a" stroke="#102b2b" stroke-width="4"/>
      <text x="32" y="170" font-size="16" fill="#3e504d">Switch, confirm, repeat</text>
    </g>

    <path d="M608 166h30" stroke="#70c5b8" stroke-width="8" stroke-linecap="round"/>
    <path d="M630 152l18 14-18 14" fill="none" stroke="#70c5b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(656 74)">
      <rect width="250" height="184" rx="22" fill="#ffffff" stroke="#d8d1bf" stroke-width="2"/>
      <circle cx="42" cy="42" r="24" fill="#f0b35a"/>
      <text x="42" y="50" text-anchor="middle" font-size="23" font-weight="800" fill="#102b2b">3</text>
      <text x="78" y="48" font-size="25" font-weight="750" fill="#102b2b">Collect</text>
      <circle cx="126" cy="119" r="10" fill="#f0b35a"/>
      <path d="M102 96a34 34 0 0 0 0 46M150 96a34 34 0 0 1 0 46M82 78a59 59 0 0 0 0 82M170 78a59 59 0 0 1 0 82" fill="none" stroke="#70c5b8" stroke-width="7" stroke-linecap="round"/>
      <path d="M126 129v28" stroke="#102b2b" stroke-width="7" stroke-linecap="round"/>
      <text x="32" y="170" font-size="16" fill="#3e504d">Attributed observations</text>
    </g>

    <path d="M918 166h30" stroke="#70c5b8" stroke-width="8" stroke-linecap="round"/>
    <path d="M940 152l18 14-18 14" fill="none" stroke="#70c5b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(966 74)">
      <rect width="250" height="184" rx="22" fill="#102b2b"/>
      <circle cx="42" cy="42" r="24" fill="#f0b35a"/>
      <text x="42" y="50" text-anchor="middle" font-size="23" font-weight="800" fill="#102b2b">4</text>
      <text x="78" y="48" font-size="25" font-weight="750" fill="#f7f1df">Review</text>
      <path d="M38 142V94M75 142v-28M112 142V82M149 142v-43" stroke="#70c5b8" stroke-width="12" stroke-linecap="round"/>
      <path d="M34 151h120" stroke="#f7f1df" stroke-width="5" stroke-linecap="round" opacity=".85"/>
      <text x="28" y="174" font-size="16" fill="#f7f1df">Results plus limitations</text>
    </g>
  </g>
</svg>
