<svg xmlns="http://www.w3.org/2000/svg" width="980" height="570" viewBox="0 0 980 570" role="img" aria-labelledby="title desc"><title id="title">Distinct four-character Maidenhead grids by band</title><desc id="desc">Geographic and numerical comparison of WSPR reporting receivers and Reverse Beacon Network skimmers.</desc><style>text{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172026}.small{font-size:13px}.label{font-size:15px;font-weight:650}.heading{font-size:25px;font-weight:750}.subheading{font-size:17px;font-weight:650}.note{font-size:12px;fill:#52616b}.land{fill:#f1eee7;stroke:#aeb8bd;stroke-width:.55}.panel{fill:#fbfaf7;stroke:#cbd3d6;stroke-width:1}.grid{stroke:#e0e4e5;stroke-width:.6}.wspr{fill:#2d6cdf;fill-opacity:.34}.rbn{fill:#d45d00;fill-opacity:.82;stroke:#7f3700;stroke-width:.35}</style><defs></defs><rect width="100%" height="100%" fill="#ffffff"/><text class="heading" x="50" y="45">Geographic spread: occupied four-character grids</text><text class="note" x="50" y="68">WSPR uses the seven-day window; RBN uses the active-node snapshot.</text><line class="grid" x1="80" y1="465.0" x2="910" y2="465.0"/><text class="note" x="68" y="469.0" text-anchor="end">0</text><line class="grid" x1="80" y1="406.9" x2="910" y2="406.9"/><text class="note" x="68" y="410.9" text-anchor="end">100</text><line class="grid" x1="80" y1="348.9" x2="910" y2="348.9"/><text class="note" x="68" y="352.9" text-anchor="end">200</text><line class="grid" x1="80" y1="290.8" x2="910" y2="290.8"/><text class="note" x="68" y="294.8" text-anchor="end">300</text><line class="grid" x1="80" y1="232.7" x2="910" y2="232.7"/><text class="note" x="68" y="236.7" text-anchor="end">400</text><line class="grid" x1="80" y1="174.7" x2="910" y2="174.7"/><text class="note" x="68" y="178.7" text-anchor="end">500</text><line class="grid" x1="80" y1="116.6" x2="910" y2="116.6"/><text class="note" x="68" y="120.6" text-anchor="end">600</text><rect x="144.3" y="179.3