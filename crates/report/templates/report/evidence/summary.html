<dl class="stat-grid">
  <div class="stat">
    <dt>Total observations</dt>
    <dd>
      {{ view.total }}
    </dd>
  </div>
  <div class="stat">
    <dt>Usable</dt>
    <dd>
      {{ view.usable }}
    </dd>
  </div>
  <div class="stat">
    <dt>Excluded</dt>
    <dd>
      {{ view.excluded }}
    </dd>
  </div>
  <div class="stat">
    <dt>Usable kinds</dt>
    <dd>
      {{ view.kinds }}
    </dd>
  </div>
  <div class="stat">
    <dt>Exclusions</dt>
    <dd>
      {{ view.exclusions }}
    </dd>
  </div>
  <div class="stat">
    <dt>SNR statistics</dt>
    <dd>
      {{ view.snr }}
    </dd>
  </div>
</dl>
