[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
unsound = "all"
maximum-db-staleness = "P1D"
unused-ignored-advisory = "deny"
ignore = [
  { id = "RUSTSEC-2024-0429", reason = "Tauri's Linux GTK stack requires glib 0.18; tracked by issue 83 through 2026-08-13" },
]

[bans]
multiple-versions = "warn"
multiple-versions-include-dev = true
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[licenses]
confidence-threshold = 0.93
include-dev = true
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
exceptions = [
  { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots@1.0.8" },
]
unused-license-exception = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
unused-allowed-source = "deny"
