name: Temporary WSPR receiver census

on:
  pull_request:
    paths:
      - .github/workflows/wspr-receiver-census.yml

permissions:
  contents: read

jobs:
  census:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Query bounded WSPR.live and RBN aggregates
        shell: python
        run: |
          import csv
          import io
          import json
          import urllib.parse
          import urllib.request
          from collections import Counter, defaultdict
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          wspr_endpoint = "https://db1.wspr.live/?query="
          rbn_endpoint = "https://www.reversebeacon.net/nodes/detail_json.php"
          band_labels = {7: "40m", 14: "20m", 21: "15m"}
          all_hf_bands = (1, 3, 5, 7, 10, 14, 18, 21, 24, 28, 50)
          end = datetime.now(timezone.utc).replace(minute=0, second=0, microsecond=0)
          out = Path("receiver-census")
          out.mkdir()

          def request_text(url: str, accept: str, timeout: int = 180) -> str:
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "AntennaBench-research/1.0 (+https://github.com/rwjblue/antennabench)",
                      "Accept": accept,
                  },
              )
              with urllib.request.urlopen(req, timeout=timeout) as response:
                  return response.read().decode("utf-8")

          def wspr_query(query: str):
              url = wspr_endpoint + urllib.parse.quote(query, safe="")
              text = request_text(url, "text/csv")
              rows = list(csv.DictReader(io.StringIO(text)))
              if not rows:
                  raise RuntimeError("WSPR.live returned no rows")
              return rows

          summary = {
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "end_utc": end.isoformat(),
              "mode": "WSPR-2 (code=1)",
              "all_hf_bands": all_hf_bands,
              "popular_bands": band_labels,
              "windows": {},
          }

          # One bounded aggregate query per time window, covering all HF WSPR bands.
          for hours in (24, 72, 168):
              start = end - timedelta(hours=hours)
              query = f"""
          SELECT
            upperUTF8(rx_sign) AS reporter_call,
            upperUTF8(rx_loc) AS reporter_grid,
            any(rx_lat) AS latitude,
            any(rx_lon) AS longitude,
            count() AS spots,
            min(time) AS first_seen,
            max(time) AS last_seen,
            uniqExact(toDate(time)) AS active_days
          FROM wspr.rx
          WHERE time >= toDateTime('{start:%Y-%m-%d %H:%M:%S}')
            AND time < toDateTime('{end:%Y-%m-%d %H:%M:%S}')
            AND band IN ({','.join(map(str, all_hf_bands))})
            AND code = 1
            AND rx_sign != ''
            AND rx_loc != ''
            AND rx_lat BETWEEN -90 AND 90
            AND rx_lon BETWEEN -180 AND 180
          GROUP BY reporter_call, reporter_grid
          ORDER BY reporter_call, reporter_grid
          FORMAT CSVWithNames
          """.strip()
              rows = wspr_query(query)
              path = out / f"wspr-receivers-{hours}h.csv"
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=rows[0].keys())
                  writer.writeheader()
                  writer.writerows(rows)
              four_char = [row["reporter_grid"][:4] for row in rows if len(row["reporter_grid"]) >= 4]
              summary["windows"][str(hours)] = {
                  "start_utc": start.isoformat(),
                  "end_utc": end.isoformat(),
                  "unique_reporter_grid_pairs": len(rows),
                  "unique_reporter_calls": len({row["reporter_call"] for row in rows}),
                  "unique_four_character_grids": len(set(four_char)),
                  "total_spots": sum(int(row["spots"]) for row in rows),
                  "persistent_all_days": sum(int(row["active_days"]) >= max(1, hours // 24) for row in rows),
                  "top_four_character_grids": Counter(four_char).most_common(25),
                  "query": query,
              }

          # A single seven-day query broken down by the popular 40m, 20m, and 15m bands.
          start = end - timedelta(hours=168)
          popular_band_values = tuple(band_labels)
          band_query = f"""
          SELECT
            band,
            upperUTF8(rx_sign) AS reporter_call,
            upperUTF8(rx_loc) AS reporter_grid,
            any(rx_lat) AS latitude,
            any(rx_lon) AS longitude,
            count() AS spots,
            min(time) AS first_seen,
            max(time) AS last_seen,
            uniqExact(toDate(time)) AS active_days
          FROM wspr.rx
          WHERE time >= toDateTime('{start:%Y-%m-%d %H:%M:%S}')
            AND time < toDateTime('{end:%Y-%m-%d %H:%M:%S}')
            AND band IN ({','.join(map(str, popular_band_values))})
            AND code = 1
            AND rx_sign != ''
            AND rx_loc != ''
            AND rx_lat BETWEEN -90 AND 90
            AND rx_lon BETWEEN -180 AND 180
          GROUP BY band, reporter_call, reporter_grid
          ORDER BY band, reporter_call, reporter_grid
          FORMAT CSVWithNames
          """.strip()
          band_rows = wspr_query(band_query)
          with (out / "wspr-receivers-by-band-168h.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=band_rows[0].keys())
              writer.writeheader()
              writer.writerows(band_rows)

          wspr_band_summary = {}
          for band_value, label in band_labels.items():
              rows = [row for row in band_rows if int(row["band"]) == band_value]
              wspr_band_summary[label] = {
                  "band_value": band_value,
                  "unique_reporter_grid_pairs": len(rows),
                  "unique_reporter_calls": len({row["reporter_call"] for row in rows}),
                  "unique_four_character_grids": len({row["reporter_grid"][:4] for row in rows}),
                  "total_spots": sum(int(row["spots"]) for row in rows),
                  "persistent_all_7_days": sum(int(row["active_days"]) >= 7 for row in rows),
              }
          summary["wspr_popular_band_168h"] = wspr_band_summary
          summary["wspr_popular_band_query"] = band_query

          # Fetch the official RBN active-node JSON once. Keep the raw response only in
          # this short-lived research artifact so its schema can be inspected before
          # generating a reduced, attributed snapshot for documentation.
          rbn_text = request_text(rbn_endpoint, "application/json", timeout=90)
          rbn_json = json.loads(rbn_text)
          if not isinstance(rbn_json, list):
              raise RuntimeError("RBN endpoint did not return a node list")
          (out / "rbn-active-nodes.json").write_text(
              json.dumps(rbn_json, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          summary["rbn_active_nodes"] = {
              "endpoint": rbn_endpoint,
              "records": len(rbn_json),
              "sample_keys": sorted({key for row in rbn_json[:20] if isinstance(row, dict) for key in row}),
          }

          (out / "summary.json").write_text(json.dumps(summary, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(summary, indent=2))

      - name: Upload census
        uses: actions/upload-artifact@v4
        with:
          name: receiver-census-banded
          path: receiver-census
          retention-days: 1
