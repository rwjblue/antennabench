name: Deploy public project site

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_revision:
        description: Reviewed commit SHA from main to deploy or redeploy
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hosted-site-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy reviewed site
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://antennabench.com
    env:
      SOURCE_REVISION: ${{ github.event_name == 'workflow_dispatch' && inputs.source_revision || github.sha }}
    steps:
      - name: Checkout selected source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.SOURCE_REVISION }}
          fetch-depth: 0

      - name: Require reviewed main history
        shell: bash
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Production source must already be part of reviewed main history" >&2
            exit 1
          }

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.6
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Validate locked hosted workspace
        run: mise run hosted:test

      - name: Deploy static site
        run: npm run deploy:site --workspace @antennabench/hosted
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
