name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux:
    name: Linux full quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Export stacked branch history
        run: |
          git fetch origin \
            main \
            agent/module-size-budget \
            agent/split-report-html \
            agent/split-open-session
          git bundle create /tmp/antennabench-stack.bundle \
            refs/remotes/origin/main \
            refs/remotes/origin/agent/module-size-budget \
            refs/remotes/origin/agent/split-report-html \
            refs/remotes/origin/agent/split-open-session

      - name: Upload stacked branch history
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: antennabench-stack-bundle
          path: /tmp/antennabench-stack.bundle
          retention-days: 1

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.6
          github_token: ${{ github.token }}

      - name: Run CI checks
        run: mise run ci

      - name: Upload module-size diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-size-linux
          path: target/module-size/last-run.log
          if-no-files-found: ignore
          retention-days: 7

  desktop-portability:
    name: Desktop portability (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15
          - name: Windows
            os: windows-2025
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.6
          github_token: ${{ github.token }}

      - name: Run portable workspace tests
        run: mise run test

      - name: Run frontend state tests
        run: mise run desktop:frontend-test

      - name: Run unattended desktop workflow
        run: mise run desktop:e2e

      - name: Compile native desktop application
        run: mise run desktop:build

      - name: Upload desktop workflow diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-e2e-${{ matrix.name }}
          path: target/desktop-e2e/last-run.log
          if-no-files-found: ignore
          retention-days: 7
