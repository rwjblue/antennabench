name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  msrv:
    name: Rust 1.89 compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install declared minimum Rust toolchain
        run: rustup toolchain install 1.89.0 --profile minimal

      - name: Check declared Rust minimum
        run: mise run msrv

  linux:
    name: Linux full quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks
        run: mise run ci

  desktop-portability:
    name: Desktop portability (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run portable workspace tests
        run: mise run test

      - name: Run frontend state tests
        run: mise run desktop:frontend-test

      - name: Run unattended desktop workflow
        run: mise run desktop:e2e

      - name: Compile native desktop application
        run: mise run desktop:build

      - name: Upload desktop workflow diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-${{ matrix.name }}
          path: target/desktop-e2e/last-run.log
          if-no-files-found: ignore
          retention-days: 7
