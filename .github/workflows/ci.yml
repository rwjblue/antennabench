name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux:
    name: Linux full quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.6
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v3-rust

      - name: Run CI checks
        run: mise run ci

      - name: Upload module-size diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-size-linux
          path: target/module-size/last-run.log
          if-no-files-found: ignore
          retention-days: 7

  desktop-portability:
    name: Desktop portability (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15
          - name: Windows
            os: windows-2025
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.6
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v3-rust

      - name: Run portable workspace tests
        run: mise run test

      - name: Run frontend state tests
        run: mise run desktop:frontend-test

      - name: Run unattended desktop workflow
        run: mise run desktop:e2e

      - name: Compile native desktop application
        run: mise run desktop:build

      - name: Upload desktop workflow diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-e2e-${{ matrix.name }}
          path: target/desktop-e2e/last-run.log
          if-no-files-found: ignore
          retention-days: 7
